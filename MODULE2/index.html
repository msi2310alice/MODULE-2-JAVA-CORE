<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khởi đầu Hành trình Lập trình</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: rgba(20, 22, 30, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-primary: #4d96ff;
            --accent-secondary: #6bcbee;
            --accent-glow: rgba(77, 150, 255, 0.3);
            --text-primary: #f5f6f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --ide-header-bg: #161920;
            --ide-body-bg: #0f1115;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Glowing background blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            z-index: -1;
            filter: blur(120px);
            opacity: 0.15;
        }

        body::before {
            top: 10%;
            left: 10%;
            background: linear-gradient(45deg, var(--accent-primary), #a855f7);
            animation: float-slow 15s infinite alternate;
        }

        body::after {
            bottom: 10%;
            right: 10%;
            background: linear-gradient(45deg, #3b82f6, var(--accent-secondary));
            animation: float-slow 20s infinite alternate-reverse;
        }

        @keyframes float-slow {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(30px) scale(1.1); }
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 24px;
            z-index: 1;
        }

        /* Card styles with Glassmorphism */
        .welcome-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4),
                        0 0 50px rgba(77, 150, 255, 0.05);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .welcome-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5),
                        0 0 60px rgba(77, 150, 255, 0.1);
        }

        /* Glowing top border */
        .welcome-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), var(--accent-secondary), transparent);
        }

        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 28px;
            background: rgba(77, 150, 255, 0.1);
            border: 1px solid rgba(77, 150, 255, 0.2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-primary);
            box-shadow: 0 8px 16px rgba(77, 150, 255, 0.1);
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 16px rgba(77, 150, 255, 0.1); }
            50% { transform: scale(1.05); box-shadow: 0 8px 24px var(--accent-glow); }
        }

        .icon-container svg {
            width: 40px;
            height: 40px;
        }

        /* Main Heading styled with beautiful gradient */
        h1 {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 30%, #a5b4fc 70%, var(--accent-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .tagline {
            font-size: 1.15rem;
            color: var(--text-secondary);
            margin-bottom: 36px;
            font-weight: 300;
        }

        /* Simulated IDE Section */
        .ide-mockup {
            text-align: left;
            background-color: var(--ide-body-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .ide-header {
            background-color: var(--ide-header-bg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }

        .ide-dots {
            display: flex;
            gap: 6px;
        }

        .ide-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-red { background-color: #ef4444; }
        .dot-yellow { background-color: #f59e0b; }
        .dot-green { background-color: #10b981; }

        .ide-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: 'Fira Code', monospace;
        }

        .ide-body {
            padding: 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #e2e8f0;
            overflow-x: auto;
        }

        .keyword { color: #f472b6; }
        .type { color: #60a5fa; }
        .method { color: #34d399; }
        .string { color: #fbbf24; }
        .comment { color: var(--text-muted); }

        /* Console Output Container */
        .console-output {
            background-color: #07080b;
            border-top: 1px solid var(--border-color);
            padding: 12px 20px;
            font-family: 'Fira Code', monospace;
            font-size: 0.85rem;
            color: var(--text-secondary);
            min-height: 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .console-line {
            display: flex;
            align-items: center;
        }

        .console-prompt {
            color: var(--accent-primary);
            margin-right: 8px;
            user-select: none;
        }

        .console-text {
            color: var(--text-primary);
        }

        .console-text.success {
            color: var(--success-color);
            font-weight: 500;
            animation: fadeIn 0.4s ease forwards;
        }

        /* Action Buttons */
        .cta-group {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            padding: 14px 28px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), #3b82f6);
            color: #ffffff;
            border: none;
            box-shadow: 0 4px 14px var(--accent-glow);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px var(--accent-glow), 0 0 10px rgba(77, 150, 255, 0.4);
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Custom cursor animation for typing output */
        .cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: var(--accent-secondary);
            margin-left: 4px;
            animation: blink 0.8s steps(2, start) infinite;
        }

        @keyframes blink {
            to { visibility: hidden; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom footer decoration */
        .footer {
            margin-top: 40px;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Responsive refinements */
        @media (max-width: 640px) {
            h1 {
                font-size: 2.2rem;
            }
            .welcome-card {
                padding: 32px 20px;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="welcome-card">
            <div class="icon-container">
                <!-- Glowing bracket code icon -->
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5" />
                </svg>
            </div>
            
            <h1>Tôi bắt đầu học lập trình</h1>
            <p class="tagline">Hành trình vạn dặm bắt đầu từ dòng code đầu tiên.</p>

            <!-- Interactive mock IDE -->
            <div class="ide-mockup">
                <div class="ide-header">
                    <div class="ide-dots">
                        <div class="ide-dot dot-red"></div>
                        <div class="ide-dot dot-yellow"></div>
                        <div class="ide-dot dot-green"></div>
                    </div>
                    <div class="ide-title">App.java</div>
                    <div style="width: 42px;"></div> <!-- spacer -->
                </div>
                <div class="ide-body">
                    <span class="keyword">public class</span> <span class="type">App</span> {<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;<span class="keyword">public static void</span> <span class="method">main</span>(String[] args) {<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;System.out.<span class="method">println</span>(<span class="string">"Tôi bắt đầu học lập trình"</span>);<br>
                    &nbsp;&nbsp;&nbsp;&nbsp;}<br>
                    }
                </div>
                <!-- Simulated Output Terminal -->
                <div class="console-output" id="console">
                    <div class="console-line">
                        <span class="console-prompt">$</span>
                        <span class="console-text" id="consoleText" style="color: var(--text-muted);">Nhấn "Chạy Code" để thực thi...</span>
                        <span class="cursor" id="terminalCursor" style="display: none;"></span>
                    </div>
                </div>
            </div>

            <!-- Action buttons -->
            <div class="cta-group">
                <button class="btn btn-primary" id="runBtn" onclick="runSimulation()">
                    <!-- Play icon -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2.5">
                        <path d="M5 3L19 12L5 21V3Z" fill="currentColor" stroke-linejoin="round"/>
                    </svg>
                    Chạy Code
                </button>
                <button class="btn btn-secondary" onclick="resetSimulation()">
                    Làm mới
                </button>
            </div>

            <div class="footer">
                &lt; Hello World /&gt; &bull; 2026
            </div>
        </div>
    </div>

    <script>
        let isRunning = false;

        function runSimulation() {
            if (isRunning) return;
            isRunning = true;

            const runBtn = document.getElementById('runBtn');
            const consoleText = document.getElementById('consoleText');
            const cursor = document.getElementById('terminalCursor');

            // Disable button during animation
            runBtn.disabled = true;
            runBtn.style.opacity = '0.7';

            // Phase 1: Compile action
            consoleText.innerHTML = "javac App.java && java App";
            consoleText.style.color = "var(--text-secondary)";
            cursor.style.display = "inline-block";

            setTimeout(() => {
                // Phase 2: Success result output
                consoleText.innerHTML = "";
                cursor.style.display = "none";
                
                const targetText = "Tôi bắt đầu học lập trình";
                let index = 0;
                
                // Typing effect for the output string
                const interval = setInterval(() => {
                    if (index < targetText.length) {
                        consoleText.innerHTML += targetText.charAt(index);
                        index++;
                    } else {
                        clearInterval(interval);
                        consoleText.className = "console-text success";
                        runBtn.disabled = false;
                        runBtn.style.opacity = '1';
                        isRunning = false;
                    }
                }, 40, "success");
            }, 800);
        }

        function resetSimulation() {
            if (isRunning) return;
            const consoleText = document.getElementById('consoleText');
            const cursor = document.getElementById('terminalCursor');
            consoleText.innerHTML = 'Nhấn "Chạy Code" để thực thi...';
            consoleText.className = "console-text";
            consoleText.style.color = "var(--text-muted)";
            cursor.style.display = "none";
        }
    </script>
</body>
</html>
